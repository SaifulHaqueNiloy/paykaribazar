name: paykari_bazar
description: "A modern e-commerce app for local business, rebuilt for stability and performance."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.9
  go_router: ^17.3.0
  flutter_riverpod: ^2.6.1
  get_it: ^9.2.1

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_database: ^12.4.2
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  firebase_analytics: ^12.4.2
  firebase_crashlytics: ^5.2.3
  firebase_app_check: ^0.4.4



  # Auth Providers
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.7

  # UI & UX
  google_fonts: ^8.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.3.3
  badges: ^3.2.0
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  pdf: ^3.12.0
  printing: ^5.11.1
  widgets_to_image: ^2.0.1
  flutter_widget_from_html: ^0.17.2

  # Security
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  encrypt: ^5.0.1

  # Utilities
  image_picker: ^1.2.2
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  permission_handler: ^12.0.3
  dio: ^5.5.0+1 
  flutter_image_compress: ^2.3.0
  file_picker: ^8.3.7
  device_info_plus: ^10.1.2
  photo_manager: ^3.3.0
  workmanager: ^0.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  retry: ^3.1.2
  collection: ^1.18.0

  # AI & Maps
  google_generative_ai: ^0.4.3
  crypto: ^3.0.7
  google_maps_flutter: ^2.17.1
  geolocator: ^13.0.0
  fl_chart: ^1.2.0
  sensors_plus: ^7.0.0
  share_plus: ^10.1.4
  flutter_dotenv: ^6.0.1
  csv: ^8.0.0
  sentry_flutter: ^9.22.0
  flutter_local_notifications: ^22.0.1
  firebase_remote_config: ^6.5.2
  package_info_plus: ^9.0.0

  path: ^1.9.0
  uuid: ^4.5.1
  rxdart: ^0.28.0
  http: ^1.2.0
  record: ^7.1.0
  speech_to_text: ^7.4.0
  intl: ^0.20.2
  firebase_performance: any


  cloud_firestore_platform_interface: any
  path_provider_platform_interface: any
  plugin_platform_interface: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  fake_cloud_firestore: any

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - shorebird.yaml
    - .env

  fonts:
    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
        - asset: assets/fonts/HindSiliguri-Bold.ttf
          weight: 700