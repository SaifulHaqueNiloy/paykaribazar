name: paykari_bazar
description: "A modern e-commerce app for local business, rebuilt for stability and performance."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  get_it: ^8.0.2
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_database: ^11.0.2
  firebase_storage: ^12.1.1
  firebase_messaging: ^15.0.2
  firebase_analytics: ^11.1.1
  firebase_crashlytics: ^4.0.2

  # Auth Providers
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1

  # UI & UX
  google_fonts: ^7.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  badges: ^3.1.2
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  pdf: ^3.10.8
  printing: ^5.11.1
  widgets_to_image: ^2.0.1
  flutter_widget_from_html: ^0.15.1

  # Security ⭐ NEW
  local_auth: ^2.1.6
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.1

  # Utilities
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  dio: ^5.5.0+1 
  flutter_image_compress: ^2.3.0
  file_picker: ^8.0.6
  device_info_plus: ^10.1.0
  photo_manager: ^3.3.0
  workmanager: ^0.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  retry: ^3.1.2

  # AI & Maps (UPDATED TO LATEST)
  google_generative_ai: ^0.4.3
  crypto: 3.0.7
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  fl_chart: ^0.69.0
  sensors_plus: ^6.1.1
  share_plus: ^10.1.4
  flutter_dotenv: ^5.1.0
  csv: ^6.0.0
  sentry_flutter: ^9.13.0
  flutter_local_notifications: ^17.2.2
  firebase_remote_config: ^5.5.0
  package_info_plus: ^9.0.0
  shorebird_code_push: ^2.0.5

  path: ^1.9.0
  uuid: ^4.5.1
  rxdart: ^0.28.0
  http: ^1.2.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  speech_to_text: ^7.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  cloud_firestore_platform_interface: any
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/lottie/
    - shorebird.yaml
