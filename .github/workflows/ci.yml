name: CI - Test & Analyze

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  analyze:
    name: Flutter Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.0'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Flutter Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run Tests
        run: flutter test --coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  build-customer:
    name: Build Customer App (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (Customer)
        run: flutter build apk -t lib/main_customer.dart --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: customer-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-admin:
    name: Build Admin App (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (Admin)
        run: flutter build apk -t lib/main_admin.dart --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: admin-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-web:
    name: Build Web Apps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web (Customer)
        run: |
          flutter build web --dart-define=FLUTTER_WEB_USE_SKI=false -t lib/main_customer.dart
          mv build/web build/web_customer

      - name: Build Web (Admin)
        run: |
          flutter build web --dart-define=FLUTTER_WEB_USE_SKI=false -t lib/main_admin.dart
          mv build/web build/web_admin

      - name: Upload web artifacts
        uses: actions/upload-artifact@v3
        with:
          name: web-builds
          path: build/web_*
          retention-days: 7

  notify:
    name: Notify Build Results
    runs-on: ubuntu-latest
    needs: [analyze, build-customer, build-admin, build-web]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ] || \
             [ "${{ needs.build-customer.result }}" == "failure" ] || \
             [ "${{ needs.build-admin.result }}" == "failure" ] || \
             [ "${{ needs.build-web.result }}" == "failure" ]; then
            echo "::error::CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"
