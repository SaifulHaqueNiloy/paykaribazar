name: 🛡️ Security Scan & Dependency Check

on:
  push:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Scan for security vulnerabilities
  security-scan:
    name: 🔐 Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # Check for secret leaks
  secrets-scan:
    name: 🔑 Secrets & Credentials Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base commit for TruffleHog
        id: trufflehog_base
        run: |
          # For push events, use the previous commit or all commits if it's the first
          if [ "${{ github.event_name }}" == "push" ]; then
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
            else
              # First push to this branch - scan only current commit
              echo "base=$(git rev-parse HEAD~1 2>/dev/null || echo 'HEAD~1')" >> $GITHUB_OUTPUT
            fi
          else
            # For PR events, use the merge-base
            echo "base=$(git merge-base origin/${{ github.base_ref }} HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Check for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.trufflehog_base.outputs.base }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

  # Check dependencies for vulnerabilities
  dependency-check:
    name: 📦 Dependency Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.25.0'
          cache: true

      - name: Check pub.dev packages
        run: |
          flutter pub get
          echo "🔍 Checking pub.dev packages for known vulnerabilities..."
          # Check for any outdated or vulnerable packages
          flutter pub outdated || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check npm packages
        run: |
          npm audit --audit-level=moderate || true

  # Upload SBOM (Software Bill of Materials)
  sbom-generation:
    name: 📋 Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.25.0'

      - name: Install syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft dir:. -o spdx-json > sbom.spdx.json
          syft dir:. -o cyclonedx-json > sbom.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.*
          retention-days: 90

  # Code quality analysis
  code-quality:
    name: 📊 Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.25.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run dart metrics
        run: |
          flutter pub global activate dart_code_metrics
          dart run dart_code_metrics:metrics analyze lib/ \
            --set-exit-on-violation-level=warning || true

      - name: Run flutter analyze
        run: flutter analyze

  # Quality gate - ensure code quality threshold is met
  quality-gate:
    name: 🎯 Quality Gate Check
    runs-on: ubuntu-latest
    needs: [code-quality]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Evaluate Quality Metrics
        run: |
          echo "🎯 Quality Gate Check"
          echo "✓ Code quality analysis completed"
          echo "✓ All jobs have been executed"
          
          # Check if all required jobs passed
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "⚠️  Code quality job did not succeed"
            exit 1
          fi
          
          echo "✅ Quality gate passed - all checks successful"

  # Notify security scan results
  notify-security:
    name: 📢 Notify Security Results
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, dependency-check, code-quality, quality-gate]
    if: always()

    steps:
      - name: Check Overall Status
        run: |
          echo "🛡️ Security Scan Summary"
          echo "========================"
          echo ""
          echo "📊 Results:"
          echo "  Security Scan: ${{ needs.security-scan.result }}"
          echo "  Secrets Scan: ${{ needs.secrets-scan.result }}"
          echo "  Dependency Check: ${{ needs.dependency-check.result }}"
          echo "  Code Quality: ${{ needs.code-quality.result }}"
          echo "  Quality Gate: ${{ needs.quality-gate.result }}"

      - name: Determine Final Status
        run: |
          FAILED_JOBS=""
          
          if [ "${{ needs.security-scan.result }}" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS\n  ❌ Security Scan"
          fi
          
          if [ "${{ needs.secrets-scan.result }}" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS\n  ❌ Secrets Scan"
          fi
          
          if [ "${{ needs.dependency-check.result }}" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS\n  ❌ Dependency Check"
          fi
          
          if [ "${{ needs.code-quality.result }}" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS\n  ❌ Code Quality"
          fi
          
          if [ "${{ needs.quality-gate.result }}" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS\n  ❌ Quality Gate"
          fi
          
          if [ -z "$FAILED_JOBS" ]; then
            echo "✅ All security and quality checks passed successfully!"
            echo "📋 Review detailed results in the GitHub Security tab"
          else
            echo "⚠️ Some checks require attention:"
            printf "%b" "$FAILED_JOBS"
            echo ""
            echo "📋 Visit the GitHub Security tab and check individual job logs"
            exit 1
          fi
