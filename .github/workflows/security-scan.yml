name: 🛡️ Security Scan & Dependency Check

on:
  push:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # Scan for security vulnerabilities
  security-scan:
    name: 🔐 Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # Check for secret leaks
  secrets-scan:
    name: 🔑 Secrets & Credentials Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

  # Check dependencies for vulnerabilities
  dependency-check:
    name: 📦 Dependency Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Check pub.dev packages
        run: |
          flutter pub get
          echo "🔍 Checking pub.dev packages for known vulnerabilities..."
          # Check for any outdated or vulnerable packages
          flutter pub outdated || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check npm packages
        run: |
          npm audit --audit-level=moderate || true

  # Upload SBOM (Software Bill of Materials)
  sbom-generation:
    name: 📋 Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft dir:. -o spdx-json > sbom.spdx.json
          syft dir:. -o cyclonedx-json > sbom.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.*
          retention-days: 90

  # Code quality analysis
  code-quality:
    name: 📊 Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run dart metrics
        run: |
          flutter pub global activate dart_code_metrics
          dart run dart_code_metrics:metrics analyze lib/ \
            --set-exit-on-violation-level=warning || true

      - name: Run flutter analyze
        run: flutter analyze

  # Notify security scan results
  notify-security:
    name: 📢 Notify Security Results
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, dependency-check]
    if: always()

    steps:
      - name: Send Summary
        run: |
          echo "✅ Daily security scan completed"
          echo "Check GitHub Security tab for detailed results"
