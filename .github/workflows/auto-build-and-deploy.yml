name: 🚀 Auto Build & Deploy (Master Pipeline)

on:
  push:
    branches: [main, develop, staging]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'dna/**'
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Deploy to which platforms?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - firebase-only
          - play-store-only
          - shorebird-only
      skip_tests:
        description: 'Skip tests?'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'

permissions:
  contents: write

jobs:
  # Stage 1: Setup & Validation
  setup:
    name: 🔍 Setup & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build_number: ${{ steps.versioning.outputs.build_number }}
      version: ${{ steps.versioning.outputs.version }}
      should_deploy: ${{ steps.setup.outputs.should_deploy }}
      apps: ${{ steps.determine_apps.outputs.apps }}

    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle' # Enable Gradle caching to speed up Android builds

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate environment
        id: setup
        run: |
          echo "🔍 Validating environment..."
          
          flutter --version
          dart --version
          java -version
          
          # Check if secrets are configured
          if [[ -z "${{ secrets.FIREBASE_TOKEN }}" ]]; then
            echo "⚠️  Firebase token not configured"
          fi
          
          # Determine if we should deploy
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi
          
          echo "✅ Environment validation complete"

      - name: Auto-versioning
        id: versioning
        run: |
          # Get commit count as build number
          BUILD_NUMBER=$(git rev-list --count HEAD)
          
          # Get latest tag or create version from commit count
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "📦 Build #$BUILD_NUMBER | Version: $VERSION"

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            admin:
              - 'lib/main_admin.dart'
              - 'lib/src/features/admin/**'
              - 'shorebird_admin.yaml'
            customer:
              - 'lib/main_customer.dart'
              - 'lib/src/features/customer/**'
              - 'shorebird_customer.yaml'
            shared:
              - 'lib/src/features/!(admin|customer)/**'
              - 'lib/src/models/**'
              - 'lib/src/core/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'android/**'
              - '.github/workflows/**'

      - name: Determine apps to build
        id: determine_apps
        run: |
          BUILD_CUSTOMER=false
          BUILD_ADMIN=false
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_CUSTOMER=true
            BUILD_ADMIN=true
          elif [[ "${{ steps.changes.outputs.shared }}" == "true" ]]; then
            BUILD_CUSTOMER=true
            BUILD_ADMIN=true
          else
            if [[ "${{ steps.changes.outputs.customer }}" == "true" ]]; then
              BUILD_CUSTOMER=true
            fi
            if [[ "${{ steps.changes.outputs.admin }}" == "true" ]]; then
              BUILD_ADMIN=true
            fi
          fi
          
          # If nothing was matched, default to building both to be safe
          if [[ "$BUILD_CUSTOMER" == "false" && "$BUILD_ADMIN" == "false" ]]; then
            BUILD_CUSTOMER=true
            BUILD_ADMIN=true
          fi
          
          APPS="["
          if [[ "$BUILD_CUSTOMER" == "true" ]]; then
            APPS="$APPS\"customer\""
          fi
          if [[ "$BUILD_ADMIN" == "true" ]]; then
            if [[ "$BUILD_CUSTOMER" == "true" ]]; then
              APPS="$APPS,"
            fi
            APPS="$APPS\"admin\""
          fi
          APPS="$APPS]"
          
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "Determined apps to build: $APPS"

  # Stage 3: Testing & Analysis
  test-and-analyze:
    name: 🧪 Test & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: setup
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for analysis and testing
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache build_runner outputs
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-build-runner-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter Analyze
        run: |
          # Only analyze directories that exist to prevent command failure
          DIRS_TO_ANALYZE="lib"
          [ -d "test" ] && DIRS_TO_ANALYZE="$DIRS_TO_ANALYZE test"
          [ -d "integration_test" ] && DIRS_TO_ANALYZE="$DIRS_TO_ANALYZE integration_test"
          flutter analyze $DIRS_TO_ANALYZE --no-fatal-infos --no-fatal-warnings

      - name: Run unit tests
        run: flutter test --coverage
        continue-on-error: true

      - name: Check for dependency security issues
        run: |
          dart pub audit || echo "⚠️ dart pub audit not supported or failed"
          echo "✅ Analysis and security check complete"

  # Stage 4: Build Mobile Apps (Unified)
  build-mobile:
    name: 🏗️ Build ${{ matrix.app }} (${{ matrix.build-type }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [setup, test-and-analyze]
    if: needs.setup.result == 'success' && (needs.test-and-analyze.result == 'success' || needs.test-and-analyze.result == 'skipped')

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.setup.outputs.apps) }}
        build-type: [apk] # Disabled aab since Play Console is not ready yet

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for build process
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle' # Crucial for build-mobile job speed

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache build_runner outputs
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-build-runner-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure signing
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
        if: env.KEYSTORE_BASE64 != ''

      - name: Build ${{ matrix.app }} (${{ matrix.build-type }})
        run: |
          if [ "${{ matrix.build-type }}" == "apk" ]; then
            flutter build apk -t lib/main_${{ matrix.app }}.dart --release --target-platform android-arm64 \
              --build-number=${{ needs.setup.outputs.build_number }}
            mv build/app/outputs/flutter-apk/app-release.apk \
               build/app/outputs/flutter-apk/${{ matrix.app }}-${{ needs.setup.outputs.version }}-arm64-v8a.apk || true
          else
            flutter build appbundle -t lib/main_${{ matrix.app }}.dart --release \
              --build-number=${{ needs.setup.outputs.build_number }}
            mv build/app/outputs/bundle/release/app-release.aab \
               build/app/outputs/bundle/release/${{ matrix.app }}-${{ needs.setup.outputs.version }}.aab || true
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload ${{ matrix.build-type }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.build-type }}
          path: |
            build/app/outputs/flutter-apk/${{ matrix.app }}-*.apk
            build/app/outputs/bundle/release/${{ matrix.app }}-*.aab
          retention-days: 30

  # Stage 5: Build Web App
  build-web:
    name: 🌐 Build Web App
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, test-and-analyze]

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for web build
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache build_runner outputs
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-build-runner-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web (Customer)
        run: |
          flutter build web -t lib/main_customer.dart --release -v
          mv build/web build/web_customer

      - name: Build Web (Admin)
        run: |
          flutter build web -t lib/main_admin.dart --release -v
          mv build/web build/web_admin

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: |
            build/web_customer/
            build/web_admin/
          retention-days: 30

  # Stage 6: Deploy to Firebase
  deploy-firebase:
    name: 🔥 Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-web]
    if: needs.setup.outputs.should_deploy == 'true' && (github.event.inputs.deploy_to == 'all' || github.event.inputs.deploy_to == 'firebase-only' || github.event_name == 'push')

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for deployment
          fetch-depth: 1

      - name: Setup Node.js & Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-builds
          path: build/

      - name: Deploy Firestore Rules
        run: |
          firebase deploy --only firestore:rules \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true

      - name: Deploy Storage Rules
        run: |
          firebase deploy --only storage \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true

      - name: Deploy Hosting
        run: |
          firebase deploy --only hosting \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}

  # Stage 7: Deploy to Google Play Store
  deploy-google-play:
    name: 📱 Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-mobile]
    # Disabled - Google Play Console is not ready yet
    if: false

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for deployment
          fetch-depth: 1

      - name: Download AAB artifacts
        uses: actions/download-artifact@v4
        with:
          name: customer-aab
          path: artifacts/

      - name: Download Admin AAB
        uses: actions/download-artifact@v4
        with:
          name: admin-aab
          path: artifacts/

      - name: Setup Google Play CLI
        run: |
          npm install -g bundletool

      - name: Upload to Google Play (Internal Testing)
        run: |
          echo "📤 Uploading to Google Play Store (Internal Testing track)..."
          
          # Customer app
          if ls artifacts/customer-*.aab 1> /dev/null 2>&1; then
            echo "Found Customer AAB - would upload to Play Store"
          fi
          
          # Admin app
          if ls artifacts/admin-*.aab 1> /dev/null 2>&1; then
            echo "Found Admin AAB - would upload to Play Store"
          fi
        continue-on-error: true

  # Stage 8: Deploy via Shorebird (OTA)
  deploy-shorebird:
    name: 🐦 Deploy via Shorebird (OTA)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-mobile]
    if: needs.setup.outputs.should_deploy == 'true' && (github.event_name == 'push' || github.event.inputs.deploy_to == 'all' || github.event.inputs.deploy_to == 'shorebird-only')

    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_AUTH_TOKEN }}
      SHOREBIRD_AUTH_TOKEN: ${{ secrets.SHOREBIRD_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for deployment
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Release Customer via Shorebird
        run: |
          shorebird release android \
            -t lib/main_customer.dart \
            --artifact apk \
            -r production
        continue-on-error: true

      - name: Release Admin via Shorebird
        run: |
          shorebird release android \
            -t lib/main_admin.dart \
            --artifact apk \
            -r production
        continue-on-error: true

  # Stage 9: Create Release & Notifications
  release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, build-mobile, build-web]
    if: needs.setup.result == 'success' && needs.build-mobile.result == 'success' && needs.build-web.result == 'success'

    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0 # Ensure full history for release notes

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release Notes
        id: notes
        run: |
          # Get the log between the last tag and current HEAD
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            COMMIT_LOG=$(git log --oneline -10)
          else
            COMMIT_LOG=$(git log ${LATEST_TAG}..HEAD --oneline)
          fi
          
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Build #${{ needs.setup.outputs.build_number }}" >> $GITHUB_OUTPUT
          echo "### Version: ${{ needs.setup.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Recent Commits:" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          tag_name: "build-${{ needs.setup.outputs.build_number }}"
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify Success (Slack)
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Build #${{ needs.setup.outputs.build_number }} Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Successful* ✅\nVersion: ${{ needs.setup.outputs.version }}\nBuild #: ${{ needs.setup.outputs.build_number }}\nBranch: ${{ github.ref_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: success() && env.SLACK_WEBHOOK != ''
        continue-on-error: true

  # Handle Failures
  notify-failure:
    name: 🚨 Notify Failure
    runs-on: ubuntu-latest
    needs: [setup, test-and-analyze, build-mobile, build-web]
    if: failure()

    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Notify Failure (Slack)
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Build ${{ github.ref_name }} Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Failed* ❌\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nJob: Click link to view details"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Details"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: env.SLACK_WEBHOOK != ''
        continue-on-error: true
