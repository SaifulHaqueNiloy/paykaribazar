name: 🚀 Auto Build & Deploy (Master Pipeline)

on:
  push:
    # Run on all branches to test changes immediately on push. 
    # To restrict again, uncomment the line below and comment/remove this note.
    # branches: [main, develop, staging]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'dna/**'
  schedule:
    # Keep the daily security scan schedule
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Deploy to which platforms?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - firebase-only
          - play-store-only
          - shorebird-only
      skip_tests:
        description: 'Skip tests?'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true
  FLUTTER_VERSION: '3.27.0'
  JAVA_VERSION: '17'

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  # Stage 1: Setup & Validation
  setup:
    name: 🔍 Setup & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build_number: ${{ steps.versioning.outputs.build_number }}
      version: ${{ steps.versioning.outputs.version }}
      should_deploy: ${{ steps.setup.outputs.should_deploy }}
      apps: ${{ steps.determine_apps.outputs.apps }}
      has_code_changes: ${{ steps.changes.outputs.admin == 'true' || steps.changes.outputs.customer == 'true' || steps.changes.outputs.shared == 'true' }}

    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate environment
        id: setup
        run: |
          echo "🔍 Validating environment..."
          
          flutter --version
          dart --version
          java -version
          
          # Check if secrets are configured
          if [[ -z "${{ secrets.FIREBASE_TOKEN }}" ]]; then
            echo "⚠️  Firebase token not configured"
          fi
          
          # Determine if we should deploy
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi
          
          echo "✅ Environment validation complete"

      - name: Auto-versioning
        id: versioning
        run: |
          # Get commit count as build number
          BUILD_NUMBER=$(git rev-list --count HEAD)
          
          # Get latest tag or create version from commit count
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "📦 Build #$BUILD_NUMBER | Version: $VERSION"

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            admin:
              - 'lib/main_admin.dart'
              - 'lib/src/features/admin/**'
              - 'shorebird_admin.yaml'
            customer:
              - 'lib/main_customer.dart'
              - 'lib/src/features/customer/**'
              - 'shorebird_customer.yaml'
            shared:
              - 'lib/src/features/!(admin|customer)/**'
              - 'lib/src/models/**'
              - 'lib/src/core/**'
              - 'app_shared.dart'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'android/**'
              - '.github/workflows/**'

      - name: Determine apps to build
        id: determine_apps
        run: |
          BUILD_CUSTOMER=false
          BUILD_ADMIN=false
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_CUSTOMER=true
            BUILD_ADMIN=true
          elif [[ "${{ steps.changes.outputs.shared }}" == "true" ]]; then
            BUILD_CUSTOMER=true
            BUILD_ADMIN=true
          else
            if [[ "${{ steps.changes.outputs.customer }}" == "true" ]]; then
              BUILD_CUSTOMER=true
            fi
            if [[ "${{ steps.changes.outputs.admin }}" == "true" ]]; then
              BUILD_ADMIN=true
            fi
          fi
          
          # If nothing was matched, default to building both to be safe
          if [[ "$BUILD_CUSTOMER" == "false" && "$BUILD_ADMIN" == "false" ]]; then
            BUILD_CUSTOMER=true
            BUILD_ADMIN=true
          fi
          
          APPS="["
          if [[ "$BUILD_CUSTOMER" == "true" ]]; then
            APPS="$APPS\"customer\""
          fi
          if [[ "$BUILD_ADMIN" == "true" ]]; then
            if [[ "$BUILD_CUSTOMER" == "true" ]]; then
              APPS="$APPS,"
            fi
            APPS="$APPS\"admin\""
          fi
          APPS="$APPS]"
          
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "Determined apps to build: $APPS"

  # New Stage: Prepare dependencies and code generation once
  prepare:
    name: 📦 Prepare & Generate Code
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@v4.2.0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Cache generated files
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-build-gen-${{ github.sha }}

  # Stage 3: Testing & Analysis
  test-security-analyze:
    name: 🧪 Test & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Modified to run immediately on push instead of waiting for setup/prepare
    # needs: [setup, prepare]
    if: github.event.inputs.skip_tests != 'true'

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for analysis and testing
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      
      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 📦 Dependency Audit
        run: |
          echo "🔍 Checking for dependency security issues..."
          flutter pub outdated || true
          dart pub audit || echo "⚠️ dart pub audit not supported or failed"
          npm audit --audit-level=moderate || true

      - name: Run Flutter Analyze
        run: |
          # Only analyze directories that exist to prevent command failure
          DIRS_TO_ANALYZE="lib"
          [ -d "test" ] && DIRS_TO_ANALYZE="$DIRS_TO_ANALYZE test"
          [ -d "integration_test" ] && DIRS_TO_ANALYZE="$DIRS_TO_ANALYZE integration_test"
          flutter analyze $DIRS_TO_ANALYZE --no-fatal-infos --no-fatal-warnings

      - name: 📊 Run Dart Code Metrics
        run: |
          flutter pub global activate dart_code_metrics || true
          flutter pub global run dart_code_metrics:metrics analyze lib/ --set-exit-on-violation-level=warning || true
        continue-on-error: true

      - name: Run unit tests
        run: flutter test --coverage

  # Security: Vulnerability Scanning
  vulnerability-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    # needs: setup
    timeout-minutes: 20
    # if: needs.setup.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 1
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # Security: Secret Leak Detection
  secrets-scan:
    name: 🔑 Secrets Scan
    runs-on: ubuntu-latest
    # needs: setup
    timeout-minutes: 10
    # if: needs.setup.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
      - name: Determine base commit
        id: trufflehog_base
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
            else
              echo "base=$(git rev-parse HEAD~1 2>/dev/null || echo 'HEAD~1')" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=$(git merge-base origin/${{ github.base_ref }} HEAD)" >> $GITHUB_OUTPUT
          fi
      - name: Check for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.trufflehog_base.outputs.base }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

  # Security: SBOM Generation
  sbom-generation:
    name: 📋 Generate SBOM
    runs-on: ubuntu-latest
    # needs: setup
    timeout-minutes: 15
    # if: needs.setup.outputs.has_code_changes == 'true'
    steps:
      - uses: actions/checkout@v4.2.0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: |
          syft dir:. -o spdx-json > sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.*
          retention-days: 30

  # Combined Mobile Build & Shorebird Deployment
  build-mobile:
    name: 🏗️ Mobile (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # needs: [setup, prepare, test-security-analyze]
    strategy:
      fail-fast: false
      matrix:
        app: [customer, admin]

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0 # Full history for versioning commit count

      - name: Calculate versioning
        id: versioning
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "📦 Computed Build Number: $BUILD_NUMBER"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Configure signing
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
        if: env.KEYSTORE_BASE64 != ''

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

      - name: Build & Deploy (Shorebird Only)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          # Try patching first
          if shorebird patch android --flavor ${{ matrix.app }} -t lib/main_${{ matrix.app }}.dart -- --build-number=${{ env.BUILD_NUMBER }}; then
            echo "✅ Shorebird patch succeeded!"
          # If patch fails, attempt a full release
          elif shorebird release android --flavor ${{ matrix.app }} --flutter-version=${{ env.FLUTTER_VERSION }} -t lib/main_${{ matrix.app }}.dart --artifact apk -- --build-number=${{ env.BUILD_NUMBER }}; then
            echo "✅ Shorebird release succeeded!"
          else
            echo "❌ Shorebird build failed."
            exit 1
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_AUTH_TOKEN }}

      - name: Fallback Standard Flutter Build
        if: failure() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          echo "::warning::Shorebird build failed. Falling back to standard Flutter build for code verification."
          echo "### ⚠️ Shorebird Build Failure (${{ matrix.app }})" >> $GITHUB_STEP_SUMMARY
          echo "Shorebird patch and release both failed. Running standard Flutter build to verify if the issue is code-related." >> $GITHUB_STEP_SUMMARY
          
          flutter build apk --flavor ${{ matrix.app }} -t lib/main_${{ matrix.app }}.dart --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Verify Build (Non-main Branch)
        if: github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        run: |
          flutter build apk --flavor ${{ matrix.app }} -t lib/main_${{ matrix.app }}.dart --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Rename APK for Artifact Upload
        run: |
          # Copy and rename the built APK to match the expected artifact name
          if [ -f "build/app/outputs/flutter-apk/app-${{ matrix.app }}-release.apk" ]; then
            cp build/app/outputs/flutter-apk/app-${{ matrix.app }}-release.apk build/app/outputs/flutter-apk/${{ matrix.app }}-release.apk
            echo "✅ Renamed app-${{ matrix.app }}-release.apk to ${{ matrix.app }}-release.apk"
          elif [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/${{ matrix.app }}-release.apk
            echo "✅ Renamed app-release.apk to ${{ matrix.app }}-release.apk"
          else
            echo "❌ Built APK not found at default location!"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-apk
          path: |
            build/app/outputs/flutter-apk/${{ matrix.app }}-*.apk
          retention-days: 30

  # Stage 5: Build Web App
  build-web:
    name: 🌐 Build Web (${{ matrix.web-app }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # needs: [setup, prepare, test-security-analyze, vulnerability-scan, secrets-scan]
    strategy:
      fail-fast: false
      matrix:
        web-app: [customer, admin]

    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create dummy Firebase options
        run: bash .github/scripts/create_dummy_firebase_options.sh

      - name: Build Web
        run: |
          flutter build web -t lib/main_${{ matrix.web-app }}.dart --release -v
          mkdir -p build/web_artifacts
          mv build/web build/web_artifacts/web_${{ matrix.web-app }}

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ matrix.web-app }}
          path: |
            build/web_artifacts/web_${{ matrix.web-app }}
          retention-days: 30

  # Stage 6: Deploy to Firebase
  deploy-firebase:
    name: 🔥 Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-web]
    if: needs.setup.outputs.should_deploy == 'true' && (github.event.inputs.deploy_to == 'all' || github.event.inputs.deploy_to == 'firebase-only' || github.event_name == 'push')

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for deployment
          fetch-depth: 1

      - name: Setup Node.js & Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Download customer web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build-customer
          path: build/web_customer

      - name: Download admin web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build-admin
          path: build/web_admin

      - name: Deploy Firestore Rules
        run: |
          firebase deploy --only firestore:rules \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage Rules
        run: |
          firebase deploy --only storage \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Hosting
        run: |
          firebase deploy --only hosting:customer,hosting:admin \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}

  # Stage 7: Deploy to Google Play Store
  deploy-google-play:
    name: 📱 Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-mobile]
    # Disabled - Google Play Console is not ready yet
    if: false

    steps:
      - uses: actions/checkout@v4.2.0
        with: # Full history is not needed for deployment
          fetch-depth: 1

      - name: Download AAB artifacts
        uses: actions/download-artifact@v4
        with:
          name: customer-aab
          path: artifacts/

      - name: Download Admin AAB
        uses: actions/download-artifact@v4
        with:
          name: admin-aab
          path: artifacts/

      - name: Setup Google Play CLI
        run: |
          npm install -g bundletool

      - name: Upload to Google Play (Internal Testing)
        run: |
          echo "📤 Uploading to Google Play Store (Internal Testing track)..."
          
          # Customer app
          if ls artifacts/customer-*.aab 1> /dev/null 2>&1; then
            echo "Found Customer AAB - would upload to Play Store"
          fi
          
          # Admin app
          if ls artifacts/admin-*.aab 1> /dev/null 2>&1; then
            echo "Found Admin AAB - would upload to Play Store"
          fi
        continue-on-error: true


  # Stage 9: Create Release & Notifications
  release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, build-mobile, build-web]
    if: needs.setup.result == 'success' && needs.build-mobile.result == 'success' && needs.build-web.result == 'success'

    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0 # Ensure full history for release notes

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release Notes
        id: notes
        run: |
          # Get the log between the last tag and current HEAD
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            COMMIT_LOG=$(git log --oneline -10)
          else
            COMMIT_LOG=$(git log ${LATEST_TAG}..HEAD --oneline)
          fi
          
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Build #${{ needs.setup.outputs.build_number }}" >> $GITHUB_OUTPUT
          echo "### Version: ${{ needs.setup.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Recent Commits:" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          tag_name: "build-${{ needs.setup.outputs.build_number }}"
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify Success (Slack)
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Build #${{ needs.setup.outputs.build_number }} Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Successful* ✅\nVersion: ${{ needs.setup.outputs.version }}\nBuild #: ${{ needs.setup.outputs.build_number }}\nBranch: ${{ github.ref_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: success() && env.SLACK_WEBHOOK != ''
        continue-on-error: true

  # Handle Failures
  notify-failure:
    name: 🚨 Notify Failure
    runs-on: ubuntu-latest
    needs: [setup, test-security-analyze, build-mobile, build-web]
    if: failure()

    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Notify Failure (Slack)
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Build ${{ github.ref_name }} Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Failed* ❌\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nJob: Click link to view details"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Details"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: env.SLACK_WEBHOOK != ''
        continue-on-error: true
