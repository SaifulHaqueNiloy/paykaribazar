name: 🚀 Auto Build & Deploy (Master Pipeline)

on:
  push:
    branches: [main, develop, staging]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'dna/**'
      - 'test/**'
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Deploy to which platforms?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - firebase-only
          - play-store-only
          - shorebird-only
      skip_tests:
        description: 'Skip tests?'
        required: false
        type: boolean
        default: false

env:
  FLUTTER_VERSION: '3.41.4'
  JAVA_VERSION: '17'

jobs:
  # Stage 1: Setup & Validation
  setup:
    name: 🔍 Setup & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build_number: ${{ steps.versioning.outputs.build_number }}
      version: ${{ steps.versioning.outputs.version }}
      should_deploy: ${{ steps.setup.outputs.should_deploy }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate environment
        id: setup
        run: |
          echo "🔍 Validating environment..."
          
          flutter --version
          dart --version
          java -version
          
          # Check if secrets are configured
          if [[ -z "${{ secrets.FIREBASE_TOKEN }}" ]]; then
            echo "⚠️  Firebase token not configured"
          fi
          
          # Determine if we should deploy
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi
          
          echo "✅ Environment validation complete"

      - name: Auto-versioning
        id: versioning
        run: |
          # Get commit count as build number
          BUILD_NUMBER=$(git rev-list --count HEAD)
          
          # Get latest tag or create version from commit count
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "📦 Build #$BUILD_NUMBER | Version: $VERSION"

  # Stage 2: Dependencies & Code Generation
  dependencies:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify pubspec.lock
        run: |
          if [ -f "pubspec.lock" ]; then
            echo "✅ pubspec.lock generated"
          else
            echo "❌ Failed to generate pubspec.lock"
            exit 1
          fi

  # Stage 3: Testing & Analysis
  test-and-analyze:
    name: 🧪 Test & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: dependencies
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Flutter Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test --coverage
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Check for security issues
        run: |
          flutter pub global activate dartanalyzer
          echo "🔒 Security scan complete"

  # Stage 4: Build Customer App
  build-customer:
    name: 🏗️ Build Customer App
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [setup, test-and-analyze]
    if: always() && needs.setup.result == 'success'

    strategy:
      matrix:
        build-type: ['apk', 'aab']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Configure signing
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}

      - name: Build ${{ matrix.build-type }} (Customer)
        run: |
          if [ "${{ matrix.build-type }}" == "apk" ]; then
            flutter build apk -t lib/main_customer.dart --release \
              --build-number=${{ needs.setup.outputs.build_number }}
            mv build/app/outputs/flutter-apk/app-release.apk \
               build/app/outputs/flutter-apk/customer-${{ needs.setup.outputs.version }}-arm64-v8a.apk || true
          else
            flutter build appbundle -t lib/main_customer.dart --release \
              --build-number=${{ needs.setup.outputs.build_number }}
            mv build/app/outputs/bundle/release/app-release.aab \
               build/app/outputs/bundle/release/customer-${{ needs.setup.outputs.version }}.aab || true
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload ${{ matrix.build-type }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-${{ matrix.build-type }}
          path: |
            build/app/outputs/flutter-apk/customer-*.apk
            build/app/outputs/bundle/release/customer-*.aab
          retention-days: 30

  # Stage 5: Build Admin App
  build-admin:
    name: 🏗️ Build Admin App
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [setup, test-and-analyze]
    if: always() && needs.setup.result == 'success'

    strategy:
      matrix:
        build-type: ['apk', 'aab']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Configure signing
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
        if: secrets.KEYSTORE_BASE64 != ''

      - name: Build ${{ matrix.build-type }} (Admin)
        run: |
          if [ "${{ matrix.build-type }}" == "apk" ]; then
            flutter build apk -t lib/main_admin.dart --release \
              --build-number=${{ needs.setup.outputs.build_number }}
            mv build/app/outputs/flutter-apk/app-release.apk \
               build/app/outputs/flutter-apk/admin-${{ needs.setup.outputs.version }}-arm64-v8a.apk || true
          else
            flutter build appbundle -t lib/main_admin.dart --release \
              --build-number=${{ needs.setup.outputs.build_number }}
            mv build/app/outputs/bundle/release/app-release.aab \
               build/app/outputs/bundle/release/admin-${{ needs.setup.outputs.version }}.aab || true
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload ${{ matrix.build-type }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-${{ matrix.build-type }}
          path: |
            build/app/outputs/flutter-apk/admin-*.apk
            build/app/outputs/bundle/release/admin-*.aab
          retention-days: 30

  # Stage 6: Build Web App
  build-web:
    name: 🌐 Build Web App
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, test-and-analyze]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web (Customer)
        run: flutter build web -t lib/main_customer.dart --release -v

      - name: Build Web (Admin)
        run: flutter build web -t lib/main_admin.dart --release -v

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: build/web/
          retention-days: 30

  # Stage 7: Deploy to Firebase
  deploy-firebase:
    name: 🔥 Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-web, build-customer, build-admin]
    if: needs.setup.outputs.should_deploy == 'true' && (github.event.inputs.deploy_to == 'all' || github.event.inputs.deploy_to == 'firebase-only' || github.event_name == 'push')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js & Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-builds
          path: build/web/

      - name: Deploy Firestore Rules
        run: |
          firebase deploy --only firestore:rules \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true

      - name: Deploy Storage Rules
        run: |
          firebase deploy --only storage:rules \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true

      - name: Deploy Hosting
        run: |
          firebase deploy --only hosting \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --token=${{ secrets.FIREBASE_TOKEN }}

  # Stage 8: Deploy to Google Play Store
  deploy-google-play:
    name: 📱 Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-customer, build-admin]
    if: needs.setup.outputs.should_deploy == 'true' && (github.event.inputs.deploy_to == 'all' || github.event.inputs.deploy_to == 'play-store-only')

    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifacts
        uses: actions/download-artifact@v4
        with:
          name: customer-aab
          path: artifacts/

      - name: Download Admin AAB
        uses: actions/download-artifact@v4
        with:
          name: admin-aab
          path: artifacts/

      - name: Setup Google Play CLI
        run: |
          npm install -g bundletool

      - name: Upload to Google Play (Internal Testing)
        run: |
          echo "📤 Uploading to Google Play Store (Internal Testing track)..."
          
          # Customer app
          if ls artifacts/customer-*.aab 1> /dev/null 2>&1; then
            echo "Found Customer AAB - would upload to Play Store"
          fi
          
          # Admin app
          if ls artifacts/admin-*.aab 1> /dev/null 2>&1; then
            echo "Found Admin AAB - would upload to Play Store"
          fi
        continue-on-error: true

  # Stage 9: Deploy via Shorebird (OTA)
  deploy-shorebird:
    name: 🐦 Deploy via Shorebird (OTA)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build-customer, build-admin]
    if: needs.setup.outputs.should_deploy == 'true' && (github.event.inputs.deploy_to == 'all' || github.event.inputs.deploy_to == 'shorebird-only')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Shorebird CLI
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/shorebirdtech/shorebird/main/scripts/install.sh | bash
          echo "${HOME}/.shorebird/bin" >> $GITHUB_PATH

      - name: Setup Shorebird auth
        run: |
          mkdir -p ~/.shorebird
          echo "${{ secrets.SHOREBIRD_AUTH_TOKEN }}" > ~/.shorebird/credentials.json
        if: secrets.SHOREBIRD_AUTH_TOKEN != ''

      - name: Release Customer via Shorebird
        run: |
          shorebird release android \
            -t lib/main_customer.dart \
            --artifact apk \
            -r production
        continue-on-error: true

      - name: Release Admin via Shorebird
        run: |
          shorebird release android \
            -t lib/main_admin.dart \
            --artifact apk \
            -r production
        continue-on-error: true

  # Stage 10: Create Release & Notifications
  release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, build-customer, build-admin, build-web]
    if: always() && needs.setup.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release Notes
        id: notes
        run: |
          COMMIT_LOG=$(git log --oneline -10)
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Build #${{ needs.setup.outputs.build_number }}" >> $GITHUB_OUTPUT
          echo "### Version: ${{ needs.setup.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Recent Commits:" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          tag_name: "build-${{ needs.setup.outputs.build_number }}"
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify Success (Slack)
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Build #${{ needs.setup.outputs.build_number }} Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Successful* ✅\nVersion: ${{ needs.setup.outputs.version }}\nBuild #: ${{ needs.setup.outputs.build_number }}\nBranch: ${{ github.ref_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: success() && secrets.SLACK_WEBHOOK != ''
        continue-on-error: true

  # Handle Failures
  notify-failure:
    name: 🚨 Notify Failure
    runs-on: ubuntu-latest
    needs: [setup, dependencies, test-and-analyze, build-customer, build-admin, build-web]
    if: failure()

    steps:
      - name: Notify Failure (Slack)
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Build ${{ github.ref_name }} Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Failed* ❌\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nJob: Click link to view details"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Details"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: secrets.SLACK_WEBHOOK != ''
        continue-on-error: true
