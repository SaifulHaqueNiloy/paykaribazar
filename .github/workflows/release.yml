name: 📦 GitHub Release - Build APKs

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  pre-release:
    name: ✅ Pre-Release Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4.2.0

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: 📚 Install dependencies
        run: flutter pub get

      - name: 🔧 Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🔍 Verify no compilation errors
        run: flutter analyze

      - name: 🧪 Run tests
        run: flutter test --coverage
        continue-on-error: true

  build-release:
    name: 🏗️ Build Release APKs (Customer & Admin)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: pre-release

    steps:
      - uses: actions/checkout@v4.2.0

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: 📚 Install dependencies
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🛍️ Build Customer APK
        run: |
          flutter build apk \
            -t lib/main_customer.dart \
            --release \
            --no-shrink \
            -v
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: 📝 Rename Customer APK
        run: |
          mkdir -p release_apks
          VERSION=${GITHUB_REF#refs/tags/}
          cp build/app/outputs/flutter-apk/app-release.apk release_apks/paykari_bazar_customer_${VERSION}.apk
          ls -lh release_apks/

      - name: 🧹 Clean build for Admin
        run: flutter clean

      - name: 🏢 Build Admin APK
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter build apk \
            -t lib/main_admin.dart \
            --release \
            --no-shrink \
            -v
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: 📝 Rename Admin APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cp build/app/outputs/flutter-apk/app-release.apk release_apks/paykari_bazar_admin_${VERSION}.apk
          ls -lh release_apks/

      - name: 📋 Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname --list 'v*.*.*' | sed -n '2p')
          
          if [ -z "$PREVIOUS_TAG" ]; then
            RELEASE_NOTES=$(git log --pretty=format:"%h - %s" | head -20)
          else
            RELEASE_NOTES=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"%h - %s")
          fi
          
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "## 🚀 Release: ${{ github.ref_name }}" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 📝 Changes:" >> $GITHUB_ENV
          echo "\`\`\`" >> $GITHUB_ENV
          echo "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "\`\`\`" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 📥 Downloads:" >> $GITHUB_ENV
          echo "- **🛍️ Customer App:** See attachments below" >> $GITHUB_ENV
          echo "- **🏢 Admin App:** See attachments below" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 📱 How to Install:" >> $GITHUB_ENV
          echo "1. Download the APK file for your app" >> $GITHUB_ENV
          echo "2. Transfer to your Android phone" >> $GITHUB_ENV
          echo "3. Go to Settings → Security → Enable Unknown Sources" >> $GITHUB_ENV
          echo "4. Open the APK file and install" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 🔢 Build Info:" >> $GITHUB_ENV
          echo "- **Version:** ${{ github.ref_name }}" >> $GITHUB_ENV
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_ENV
          echo "- **Build Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_apks/paykari_bazar_customer_*.apk
            release_apks/paykari_bazar_admin_*.apk
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Success Message
        run: |
          echo "✅ Release Complete!"
          echo "📥 Download APKs from: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  deploy-shorebird:
    name: Deploy via Shorebird (OTA)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-release

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install Shorebird CLI
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/shorebirdtech/shorebird/main/scripts/install.sh | bash
          echo "${HOME}/.shorebird/bin" >> $GITHUB_PATH

      - name: Setup Shorebird auth
        run: |
          mkdir -p ~/.shorebird
          echo "${{ secrets.SHOREBIRD_AUTH_TOKEN }}" > ~/.shorebird/credentials.json

      - name: Release Customer via Shorebird
        run: |
          shorebird release android \
            -t lib/main_customer.dart \
            --artifact apk \
            -- --target-platform android-arm64

      - name: Release Admin via Shorebird
        run: |
          shorebird release android \
            -t lib/main_admin.dart \
            --artifact apk \
            -- --target-platform android-arm64

  deploy-firebase:
    name: Deploy to Firebase (Hosting & Rules)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pre-release

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web (Customer)
        run: flutter build web -t lib/main_customer.dart --release

      - name: Build Web (Admin)
        run: flutter build web -t lib/main_admin.dart --release

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project=${{ secrets.FIREBASE_PROJECT_ID }} --token=${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting:customer,hosting:admin --project=${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-google-play:
    name: Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Download release builds
        uses: actions/download-artifact@v3
        with:
          name: release-builds

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: fastlane

      - name: Setup service account JSON
        run: |
          mkdir -p fastlane/metadata
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" > fastlane/metadata/service_account.json

      - name: Deploy Customer to Google Play (Beta)
        run: |
          cd fastlane
          fastlane supply \
            --package_name com.njel.paykari_bazar \
            --aab ../build/app/outputs/bundle/release/app-release.aab \
            --track beta \
            --json_key metadata/service_account.json

      - name: Deploy Admin to Google Play (Internal)
        run: |
          cd fastlane
          fastlane supply \
            --package_name com.njel.paykari_admin \
            --aab ../build/app/outputs/bundle/admin_release/app-release.aab \
            --track internal \
            --json_key metadata/service_account.json

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-release, deploy-shorebird, deploy-firebase]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: release-builds

      - name: Create Release Notes
        id: notes
        run: |
          TAG=${{ github.ref_name }}
          RELEASE_NOTES=$(cat << 'EOF'
          ## 🚀 Release $TAG

          ### 📱 What's New
          - Customer app APK: `customer-release.apk`
          - Admin app APK: `admin-release.apk`
          - Web apps deployed to Firebase Hosting

          ### 🔄 Deployment Status
          - ✅ Shorebird OTA: Deployed
          - ✅ Firebase Hosting: Deployed
          - ✅ Google Play (Beta): Deployed

          ### 📊 Build Information
          - Build Date: $(date -u)
          - Commit: ${{ github.sha }}
          - Author: ${{ github.actor }}

          EOF
          )
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/customer-release.apk
            build/app/outputs/flutter-apk/admin-release.apk
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  slack-notification:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [pre-release, build-release, deploy-shorebird, deploy-firebase]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚀 Paykari Bazar Release ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release Status*: ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}\n*Version*: ${{ github.ref_name }}\n*Commit*: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployments*:\n• Shorebird OTA: ${{ needs.deploy-shorebird.result == 'success' && '✅' || '⚠️' }}\n• Firebase: ${{ needs.deploy-firebase.result == 'success' && '✅' || '⚠️' }}\n• Pre-Release: ${{ needs.pre-release.result == 'success' && '✅' || '❌' }}"
                  }
                }
              ]
            }
